start_execution:
  name: Start execution
  description: Start a device execution cycle in EnergyOptimizer.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional EnergyOptimizer config entry ID when multiple entries exist.
      selector:
        text:
    device_name:
      name: Device name
      description: Optional device name. Defaults to the configured device.
      selector:
        text:
    reference_rate_pln_kwh:
      name: Reference rate
      description: Reference electricity rate in PLN/kWh used to calculate savings.
      required: true
      selector:
        number:
          min: 0
          max: 20
          step: 0.0001
          mode: box
    meter_start_kwh:
      name: Meter start
      description: Optional cumulative device meter value at cycle start in kWh.
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    power_kw:
      name: Power
      description: Optional fallback power in kW when no meter delta is available.
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          mode: box
    started_at:
      name: Started at
      description: Optional ISO timestamp for the cycle start.
      selector:
        text:
    metadata:
      name: Metadata
      description: Optional metadata object.
      selector:
        object:

stop_execution:
  name: Stop execution
  description: Stop a device execution cycle in EnergyOptimizer.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional EnergyOptimizer config entry ID when multiple entries exist.
      selector:
        text:
    execution_id:
      name: Execution ID
      description: Optional execution ID returned by start_execution.
      selector:
        text:
    device_name:
      name: Device name
      description: Optional device name. Defaults to the configured device when execution_id is omitted.
      selector:
        text:
    meter_end_kwh:
      name: Meter end
      description: Optional cumulative device meter value at cycle end in kWh.
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    energy_kwh:
      name: Energy
      description: Optional directly reported cycle energy in kWh.
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    power_kw:
      name: Power
      description: Optional fallback power in kW.
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          mode: box
    ended_at:
      name: Ended at
      description: Optional ISO timestamp for the cycle end.
      selector:
        text:
    metadata:
      name: Metadata
      description: Optional metadata object.
      selector:
        object:

cancel_execution:
  name: Cancel execution
  description: Cancel a running or awaiting_prices device execution cycle in EnergyOptimizer.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional EnergyOptimizer config entry ID when multiple entries exist.
      selector:
        text:
    execution_id:
      name: Execution ID
      description: Optional execution ID returned by start_execution.
      selector:
        text:
    device_name:
      name: Device name
      description: Optional device name. Defaults to the configured device when execution_id is omitted.
      selector:
        text:
    reason:
      name: Reason
      description: Optional cancellation reason.
      selector:
        text:
    ended_at:
      name: Ended at
      description: Optional ISO timestamp for the cancellation time.
      selector:
        text:
    metadata:
      name: Metadata
      description: Optional metadata object.
      selector:
        object:
