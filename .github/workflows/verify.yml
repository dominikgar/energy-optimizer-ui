name: Verify UI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install dependencies
        run: npm install --no-audit --no-fund > /dev/null 2>&1
      - name: Run tests
        run: npm test > /dev/null 2>&1
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit --pretty false > type-errors.log 2>&1
      - name: Errors in device execution API
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "^lib/deviceExecutionApi.ts" type-errors.log
      - name: Errors in savings page
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "^app/savings/page.tsx" type-errors.log
      - name: Errors in savings component
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "^app/components/TabSavings.tsx" type-errors.log
      - name: Error TS2322 assignment
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS2322" type-errors.log
      - name: Error TS2345 argument
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS2345" type-errors.log
      - name: Error TS2339 property
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS2339" type-errors.log
      - name: Error TS18047 null
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS18047" type-errors.log
      - name: Error TS18048 undefined
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS18048" type-errors.log
      - name: Error TS2769 overload
        if: steps.typecheck.outcome == 'failure'
        continue-on-error: true
        run: grep -q "error TS2769" type-errors.log
      - name: Fail on type errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
