name: Verify UI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install dependencies
        run: npm install --no-audit --no-fund > /dev/null 2>&1
      - name: Run tests
        run: npm test > /dev/null 2>&1
      - name: Build application
        id: build
        continue-on-error: true
        run: npx next build > build.log 2>&1
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
      - name: Type error in device execution API
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        run: grep -B 6 -A 12 "Type error" build.log | grep -q "lib/deviceExecutionApi.ts"
      - name: Type error in savings page
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        run: grep -B 6 -A 12 "Type error" build.log | grep -q "app/savings/page.tsx"
      - name: Type error in savings component
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        run: grep -B 6 -A 12 "Type error" build.log | grep -q "app/components/TabSavings.tsx"
      - name: Type error elsewhere
        if: steps.build.outcome == 'failure'
        run: |
          grep -B 6 -A 12 "Type error" build.log || tail -n 50 build.log
          exit 1
