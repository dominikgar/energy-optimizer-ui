name: Verify UI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  collect-errors:
    runs-on: ubuntu-latest
    outputs:
      errors: ${{ steps.collect.outputs.errors }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install dependencies
        run: npm install --no-audit --no-fund > /dev/null 2>&1
      - name: Run tests
        run: npm test > /dev/null 2>&1
      - name: Collect TypeScript errors
        id: collect
        run: |
          npx tsc --noEmit --pretty false > type-errors.log 2>&1 || true
          errors=$(grep 'error TS' type-errors.log | head -n 20 | python3 -c 'import json,sys; print(json.dumps([line.strip()[:220] for line in sys.stdin]))')
          if [ "$errors" = "[]" ]; then errors='["no TypeScript errors"]'; fi
          echo "errors=$errors" >> "$GITHUB_OUTPUT"

  report-errors:
    needs: collect-errors
    strategy:
      fail-fast: false
      matrix:
        error: ${{ fromJSON(needs.collect-errors.outputs.errors) }}
    name: ${{ matrix.error }}
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: exit 1
